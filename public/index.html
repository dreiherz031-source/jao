<!DOCTYPE html>
<html>
<head>
    <title>💌 Ask Page</title>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ffb6c1, #ffe4e1);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* HEART BACKGROUND */
        .hearts {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
            overflow: hidden;
        }

        .hearts span {
            position: absolute;
            color: red;
            font-size: 20px;
            animation: floatUp 6s linear infinite;
            bottom: -50px;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) scale(1.5);
                opacity: 0;
            }
        }

        /* CARD UI */
        .card {
            position: relative;
            z-index: 2;
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 300px;
        }

        button {
            padding: 10px 20px;
            margin: 10px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
        }

        .yes {
            background: #4CAF50;
            color: white;
        }

        .no {
            background: #f44336;
            color: white;
        }

        input {
            padding: 10px;
            width: 90%;
            margin-top: 10px;
            border-radius: 10px;
            border: 1px solid #ccc;
        }
    </style>
</head>

<body>

<!-- HEART BACKGROUND -->
<div class="hearts"></div>

<!-- MAIN CARD -->
<div class="card">
    <h2>💌 Makauyab pako????</h2>

    <button class="yes" onclick="sendAnswer('YES')">YES</button>
    <button class="no" onclick="sendAnswer('NO')">NO</button>

    <br>

    <input id="reason" placeholder="why? (optional)">
</div>

<script>
function sendAnswer(answer) {
    const reason = document.getElementById("reason").value;

    fetch("/submit", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            answer: answer,
            reason: reason
        })
    })
    .then(res => res.json())
    .then(data => {
        alert("Sent 💌 Thank you!");
    });
}

/* FLOATING HEARTS */
function createHearts() {
    const container = document.querySelector(".hearts");

    for (let i = 0; i < 40; i++) {
        let heart = document.createElement("span");
        heart.innerHTML = "❤️";

        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = (Math.random() * 20 + 10) + "px";
        heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
        heart.style.opacity = Math.random();

        container.appendChild(heart);
    }
}

createHearts();
</script>

</body>
</html>
