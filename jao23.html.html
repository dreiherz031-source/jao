<!DOCTYPE html>
<html>
<head>
<title>💌 Question</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: linear-gradient(to top, pink, white);
    margin-top: 80px;
    overflow: hidden;
}

h1 {
    color: #ff4d88;
}

button {
    padding: 15px 30px;
    margin: 20px;
    font-size: 18px;
    border: none;
    cursor: pointer;
    border-radius: 10px;
}

#yes {
    background: green;
    color: white;
}

#no {
    background: red;
    color: white;
}

#result {
    margin-top: 30px;
}

/* 🔥 IMAGE FIX STYLE */
img {
    width: 380px;
    max-width: 90%;
    height: auto;
    border-radius: 20px;
    margin-top: 20px;
    box-shadow: 0 0 25px rgba(0,0,0,0.4);
    display: block;
    margin-left: auto;
    margin-right: auto;
}

/* hearts animation */
.heart {
    position: absolute;
    bottom: -50px;
    color: red;
    font-size: 20px;
    animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-110vh); opacity: 0; }
}
</style>
</head>

<body>

<h1>💌 Pwede ko manguyab nimo?</h1>

<button id="yes" onclick="yes()">YES</button>
<button id="no" onclick="no()">NO</button>

<div id="result"></div>

<script>

// floating hearts
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";

    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.animationDuration = (3 + Math.random() * 3) + "s";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 6000);
}
setInterval(createHeart, 300);

// YES button
function yes() {
    document.getElementById("result").innerHTML = `
        <h2>🥰 Yeey! Thank you!</h2>
        <p>Promise, ako bahala nimo 💖</p>

        <!-- 🔥 IMPORTANT: IMAGE -->
        <img src="./me.jpg" alt="my picture">
    `;
}

// NO button
function no() {
    document.getElementById("result").innerHTML = `
        <h2>😢 Okay ra...</h2>
        <p>Respect ra gihapon, thank you 💔</p>
    `;
}

</script>

</body>
</html>
