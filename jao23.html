<!DOCTYPE html>
<html>
<head>
<title>💌 Ask</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: linear-gradient(to top, pink, white);
    margin-top: 80px;
}

h1 {
    color: #ff3366;
}

button {
    padding: 15px 25px;
    margin: 10px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background: #ff4d88;
    color: white;
}

input {
    padding: 10px;
    width: 250px;
    font-size: 16px;
    margin-top: 10px;
}

#result {
    margin-top: 20px;
    font-size: 18px;
    white-space: pre-line;
}
</style>
</head>

<body>

<h1>💌 Pwede ko manguyab Ms. Andojar?</h1>

<button onclick="choose('YES')">YES</button>
<button onclick="choose('NO')">NO</button>

<div id="content"></div>
<div id="result"></div>

<script>

let choice = "";

function choose(c) {
    choice = c;

    document.getElementById("content").innerHTML = `
        <p>You chose: <b>${c}</b></p>
        <p>Why?</p>
        <input id="reason" placeholder="Type your reason...">
        <br><br>
        <button onclick="submitAnswer()">Send</button>
    `;
}

function submitAnswer() {
    let reason = document.getElementById("reason").value;

    if (reason.trim() === "") {
        alert("Please type your answer!");
        return;
    }

    document.getElementById("result").innerHTML =
        "💌 Her Response:\n\n" +
        "Answer: " + choice + "\n" +
        "Why: " + reason;
}

</script>

</body>
</html>
